<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Horse emoji large -->
  <text x="600" y="200" font-size="120" text-anchor="middle" fill="#ffffff">🏇</text>

  <!-- Title -->
  <text x="600" y="320" font-size="60" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif">
    競馬点数計算機
  </text>

  <!-- Subtitle -->
  <text x="600" y="380" font-size="32" text-anchor="middle" fill="#e0e7ff" font-family="Arial, sans-serif">
    馬券の点数と合計金額を自動計算
  </text>

  <!-- Features -->
  <text x="600" y="460" font-size="24" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif">
    BOX買い・フォーメーション・WIN5に対応
  </text>

  <!-- Footer -->
  <text x="600" y="560" font-size="20" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif">
    無料で使える競馬計算ツール
  </text>
</svg>
